<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Ticket de Cliente</title>
    <!-- Agrega aquí tus enlaces a hojas de estilo CSS si es necesario -->
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 300px;
        }

        .form-container label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-container input,
        .form-container textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-container input[type="submit"] {
            background-color: #007bff;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .form-container input[type="submit"]:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Crear Ticket de Cliente</h2>
        <form action="{{ url('/cliente') }}" method="post" enctype="multipart/form-data">
            {{ csrf_field() }}

            <label for="Clasificacion">Clasificación:</label>
            <input class="form-control" type="text" name="Clasificacion" id="Clasificacion" value="" required>

            <label for="Detalles">Detalles:</label>
            <textarea class="form-control" name="Detalles" id="Detalles" rows="4" required></textarea>

            <input type="submit" value="Agregar">
        </form>
    </div>
</body>
</html>
